name: Bootstrap NCAAW Bart History (Run Once)

on:
  workflow_dispatch:

jobs:
  bootstrap-bt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Bart advstats + playerstat (2019-2025)
        run: |
          python3 player_cards_pipeline/scripts/fetch_bt_history_2010_2025.py \
            --year-start 2019 \
            --year-end 2025 \
            --out-dir player_cards_pipeline \
            --bart-prefix ncaaw

      - name: Normalize baseline filenames
        run: |
          cp player_cards_pipeline/data/bt/bt_advstats_2019_2025.csv player_cards_pipeline/data/bt/bt_advstats_2010_2025.csv
          cp player_cards_pipeline/data/bt/bt_playerstat_2019_2025.csv player_cards_pipeline/data/bt/bt_playerstat_2010_2025.csv
          cp player_cards_pipeline/data/bt/trank_2019_2025.csv player_cards_pipeline/data/bt/trank_2010_2025.csv

      - name: Fetch Bart all_advgames (2019-2025)
        run: |
          python3 player_cards_pipeline/scripts/fetch_bt_advgames_by_year.py \
            --year-start 2019 \
            --year-end 2025 \
            --out-dir player_cards_pipeline/data/bt \
            --bart-prefix ncaaw

      - name: Bootstrap historical enriched players (Women)
        run: |
          CMD=(python3 player_cards_pipeline/scripts/bootstrap_enriched_history.py \
            --project-root "." \
            --gender "Women")
          if [ -n "${{ secrets.ENRICHED_WOMEN_HISTORY_ZIP_URL }}" ]; then
            CMD+=(--dropbox-url "${{ secrets.ENRICHED_WOMEN_HISTORY_ZIP_URL }}")
          fi
          "${CMD[@]}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f player_cards_pipeline/data/bt/
          git add -f player_cards_pipeline/data/manual/enriched_players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Bootstrap NCAAW Bart + historical enriched datasets"
          git push
