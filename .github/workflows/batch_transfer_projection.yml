name: Batch Transfer Projection

on:
  schedule:
    - cron: "50 10 * * *" # Daily 6:50 AM ET (approx, DST-aware by UTC)
  workflow_dispatch:
    inputs:
      season:
        description: "Script season (e.g. 2026)"
        required: true
        default: "2026"
      min_games:
        description: "Minimum GP filter"
        required: true
        default: "5"
      team:
        description: "Optional source team filter (blank = all teams)"
        required: false
        default: ""
      limit:
        description: "Optional max players (0 = no limit)"
        required: true
        default: "0"
      conferences:
        description: "Optional comma-separated destination conferences (blank = all)"
        required: false
        default: ""

jobs:
  run-batch-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run batch transfer projection
        env:
          INPUT_SEASON: ${{ inputs.season || '2026' }}
          INPUT_MIN_GAMES: ${{ inputs.min_games || '5' }}
          INPUT_TEAM: ${{ inputs.team || '' }}
          INPUT_LIMIT: ${{ inputs.limit || '0' }}
          INPUT_CONFERENCES: ${{ inputs.conferences || '' }}
        run: |
          mkdir -p player_cards_pipeline/output
          TEAM_ARG=""
          CONF_ARG=""
          if [ -n "${INPUT_TEAM}" ]; then
            TEAM_ARG="--team \"${INPUT_TEAM}\""
          fi
          if [ -n "${INPUT_CONFERENCES}" ]; then
            CONF_ARG="--conferences \"${INPUT_CONFERENCES}\""
          fi

          # shellcheck disable=SC2086
          eval "python3 player_cards_pipeline/scripts/batch_transfer_projection.py \
            --project-root . \
            --season \"${INPUT_SEASON}\" \
            --min-games \"${INPUT_MIN_GAMES}\" \
            --limit \"${INPUT_LIMIT}\" \
            ${TEAM_ARG} \
            ${CONF_ARG} \
            --out-csv \"player_cards_pipeline/output/transfer_projection_${INPUT_SEASON}_all_conferences.csv\""

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: transfer-projection-${{ inputs.season || '2026' }}-all-conferences
          path: player_cards_pipeline/output/transfer_projection_${{ inputs.season || '2026' }}_all_conferences.csv
          if-no-files-found: error

      - name: Commit and push CSV
        env:
          INPUT_SEASON: ${{ inputs.season || '2026' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILE="player_cards_pipeline/output/transfer_projection_${INPUT_SEASON}_all_conferences.csv"
          git add "$FILE" || true
          if git diff --cached --quiet; then
            echo "No transfer projection CSV changes to commit."
            exit 0
          fi
          git commit -m "Refresh transfer projection matrix (${INPUT_SEASON})"
          git pull --rebase origin main || true
          git push origin main
