name: Batch Transfer Projection

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Script season (e.g. 2026)"
        required: true
        default: "2026"
      min_games:
        description: "Minimum GP filter"
        required: true
        default: "5"
      team:
        description: "Optional source team filter (blank = all teams)"
        required: false
        default: ""
      limit:
        description: "Optional max players (0 = no limit)"
        required: true
        default: "0"
      conferences:
        description: "Optional comma-separated destination conferences (blank = all)"
        required: false
        default: ""

jobs:
  run-batch-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run batch transfer projection
        run: |
          mkdir -p player_cards_pipeline/output
          TEAM_ARG=""
          CONF_ARG=""
          if [ -n "${{ inputs.team }}" ]; then
            TEAM_ARG="--team \"${{ inputs.team }}\""
          fi
          if [ -n "${{ inputs.conferences }}" ]; then
            CONF_ARG="--conferences \"${{ inputs.conferences }}\""
          fi

          # shellcheck disable=SC2086
          eval "python3 player_cards_pipeline/scripts/batch_transfer_projection.py \
            --project-root . \
            --season \"${{ inputs.season }}\" \
            --min-games \"${{ inputs.min_games }}\" \
            --limit \"${{ inputs.limit }}\" \
            ${TEAM_ARG} \
            ${CONF_ARG} \
            --out-csv \"player_cards_pipeline/output/transfer_projection_${{ inputs.season }}_all_conferences.csv\""

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: transfer-projection-${{ inputs.season }}-all-conferences
          path: player_cards_pipeline/output/transfer_projection_${{ inputs.season }}_all_conferences.csv
          if-no-files-found: error
